<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChurnSpy AI · Churn Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;1,400&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--white:#fff;--ink:#111010;--muted:#888580;--border:#e0ddd8;
  --accent:#3d5afe;--accent-light:#eef0ff;
  --danger:#e53935;--danger-light:#ffebee;
  --success:#00897b;--success-light:#e0f2f1;
  --warn:#f57c00;--warn-light:#fff3e0;
  --radius:16px;--shadow:0 2px 28px rgba(0,0,0,0.08);
}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--ink);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 16px 60px}

/* ── HEADER ── */
header{width:100%;max-width:580px;display:flex;justify-content:space-between;
  align-items:center;padding:28px 0 0}
.wordmark{font-family:'Fraunces',serif;font-size:19px;font-weight:700;letter-spacing:-.5px}
.wordmark em{font-style:italic;color:var(--accent)}
.hdr-right{display:flex;align-items:center;gap:10px}
.nav-btn{background:none;border:1px solid var(--border);border-radius:20px;
  padding:5px 14px;font-family:'Instrument Sans',sans-serif;font-size:12px;font-weight:500;
  color:var(--muted);cursor:pointer;transition:all .2s}
.nav-btn:hover,.nav-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.api-pill{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);
  background:var(--white);border:1px solid var(--border);border-radius:20px;
  padding:5px 12px;cursor:pointer;transition:border-color .2s}
.api-pill:hover{border-color:var(--accent)}
.dot{width:6px;height:6px;border-radius:50%;background:#ccc;transition:background .3s}
.dot.live{background:var(--success);box-shadow:0 0 0 3px rgba(0,137,123,.2)}

/* ── HERO ── */
.hero{width:100%;max-width:580px;padding:44px 0 28px}
.hero h1{font-family:'Fraunces',serif;font-size:clamp(30px,6vw,44px);font-weight:700;
  line-height:1.08;letter-spacing:-1.5px;margin-bottom:10px}
.hero h1 em{font-style:italic;color:var(--accent)}
.hero p{font-size:15px;color:var(--muted);line-height:1.65}

/* ── PROGRESS ── */
.prog-wrap{width:100%;max-width:580px;display:flex;gap:6px;margin-bottom:14px}
.prog-seg{flex:1;height:3px;border-radius:2px;background:var(--border);transition:background .35s}
.prog-seg.done{background:var(--accent)}

/* ── CARD ── */
.card{width:100%;max-width:580px;background:var(--white);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;
  animation:up .35s cubic-bezier(.22,1,.36,1) both}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.card-body{padding:32px 32px 20px}
.step-tag{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--accent);margin-bottom:5px}
.card-title{font-family:'Fraunces',serif;font-size:22px;font-weight:700;
  letter-spacing:-.5px;margin-bottom:22px}

/* ── FIELDS ── */
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:7px}
.row2{display:flex;gap:14px}
.row2 .field{flex:1}
input[type=number],select{
  width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;
  font-family:'Instrument Sans',sans-serif;font-size:14px;font-weight:500;color:var(--ink);
  background:var(--bg);outline:none;-webkit-appearance:none;
  transition:border-color .18s,background .18s,box-shadow .18s}
input[type=number]:focus,select:focus{
  border-color:var(--accent);background:var(--white);box-shadow:0 0 0 4px rgba(61,90,254,.1)}
select option{background:#fff}

/* ── CHIPS ── */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:8px 16px;border:1.5px solid var(--border);border-radius:40px;
  font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);background:var(--bg);
  transition:all .15s;user-select:none}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── ADVANCED TOGGLE ── */
.adv-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;
  font-size:12px;font-weight:600;color:var(--muted);margin-bottom:16px;
  user-select:none;transition:color .15s}
.adv-toggle:hover{color:var(--accent)}
.adv-arrow{display:inline-block;transition:transform .25s;font-size:10px}
.adv-arrow.open{transform:rotate(90deg)}
.adv-section{display:none;border-top:1px solid var(--border);padding-top:16px;margin-top:4px}
.adv-section.open{display:block;animation:fadein .25s ease}
@keyframes fadein{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.adv-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* ── CARD FOOTER ── */
.card-foot{display:flex;justify-content:space-between;align-items:center;
  padding:18px 32px 28px;border-top:1px solid var(--border)}
.btn-back{background:none;border:none;font-family:'Instrument Sans',sans-serif;
  font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;transition:color .15s}
.btn-back:hover{color:var(--ink)}
.btn-next{background:var(--accent);color:#fff;border:none;border-radius:10px;
  padding:12px 28px;font-family:'Instrument Sans',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;box-shadow:0 4px 16px rgba(61,90,254,.3);transition:transform .15s,box-shadow .15s}
.btn-next:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(61,90,254,.4)}
.btn-next:active{transform:scale(.98)}
.btn-next:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.err-msg{font-size:12px;color:var(--danger);padding:0 32px 12px;display:none}

/* ── RESULT ── */
.res-hero{padding:40px 32px 20px;text-align:center}
.res-icon{font-size:48px;margin-bottom:10px}
.res-verdict{font-family:'Fraunces',serif;font-size:24px;font-weight:700;letter-spacing:-.5px}
.prob-label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);margin:18px 0 6px}
.prob-num{font-family:'Fraunces',serif;font-size:72px;font-weight:700;
  letter-spacing:-4px;line-height:1;margin-bottom:20px}
.rtrack{height:8px;border-radius:4px;
  background:linear-gradient(to right,var(--success),var(--warn),var(--danger));
  position:relative;margin-bottom:6px}
.rthumb{width:18px;height:18px;border-radius:50%;background:var(--white);
  border:3px solid var(--ink);position:absolute;top:50%;
  transform:translate(-50%,-50%);
  transition:left .9s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 2px 8px rgba(0,0,0,.2)}
.rends{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);font-weight:500}
.action-box{margin:12px 32px 0;border-radius:12px;padding:16px 18px;
  display:flex;gap:12px;align-items:flex-start}
.aicon{font-size:18px;flex-shrink:0;margin-top:2px}
.atext{font-size:14px;line-height:1.55}
.atitle{display:block;font-size:11px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;margin-bottom:3px}
.meta-chips{display:flex;gap:8px;flex-wrap:wrap;padding:16px 32px 8px}
.meta-tag{font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;
  background:var(--bg);color:var(--muted);border:1px solid var(--border)}

/* ── MODEL INFO ── */
.model-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:12px;padding:8px 0}
.model-cell{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.model-key{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:5px}
.model-val{font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:var(--accent)}

/* ── BUTTONS ── */
.btn-reset{display:block;margin:12px 32px 32px;padding:14px;text-align:center;
  background:var(--bg);border:1.5px solid var(--border);border-radius:10px;
  font-family:'Instrument Sans',sans-serif;font-size:14px;font-weight:600;color:var(--ink);
  cursor:pointer;transition:border-color .15s}
.btn-reset:hover{border-color:var(--ink)}

/* ── SPINNER ── */
.spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.4);
  border-top-color:#fff;border-radius:50%;display:inline-block;vertical-align:middle;
  margin-right:6px;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <div class="wordmark">ChurnSpy<em>AI</em></div>
  <div class="hdr-right">
    <button class="nav-btn active" id="tab-predict" onclick="switchTab('predict')">Predict</button>
    <button class="nav-btn" id="tab-model" onclick="switchTab('model')">Model Info</button>
    <div class="api-pill" onclick="ping()">
      <div class="dot" id="dot"></div>
      <span id="api-lbl">checking…</span>
    </div>
  </div>
</header>

<!-- PREDICT VIEW -->
<div id="view-predict" style="width:100%;display:flex;flex-direction:column;align-items:center">
  <div class="hero">
    <h1>Will this customer<br/><em>churn?</em></h1>
    <p>Fill 4 quick steps — get an instant AI-powered churn prediction.</p>
  </div>
  <div class="prog-wrap" id="prog"></div>
  <div id="app"></div>
</div>

<!-- MODEL INFO VIEW -->
<div id="view-model" style="width:100%;max-width:580px;display:none">
  <div class="hero">
    <h1>Model <em>Registry</em></h1>
    <p>Live metadata from your MLflow champion model on Cloud Run.</p>
  </div>
  <div class="card">
    <div class="card-body" id="model-body">
      <div style="color:var(--muted);font-size:14px">Loading model info…</div>
    </div>
  </div>
</div>

<script>
const BASE = 'https://churn-api-315673521215.us-central1.run.app';

/* ── State ── */
const s = {
  tenure:'', monthly_charges:'', total_charges:'',
  contract:'', payment_method:'', paperless_billing:'Yes',
  internet_service:'', tech_support:'', online_security:'',
  online_backup:'No', device_protection:'No',
  phone_service:'Yes', multiple_lines:'No',
  streaming_tv:'No', streaming_movies:'No',
  gender:'Male', senior_citizen:0, partner:'No', dependents:'No'
};

/* ── Tab switching ── */
function switchTab(t) {
  document.getElementById('view-predict').style.display = t==='predict'?'flex':'none';
  document.getElementById('view-model').style.display   = t==='model'?'block':'none';
  document.getElementById('tab-predict').classList.toggle('active', t==='predict');
  document.getElementById('tab-model').classList.toggle('active',   t==='model');
  if (t==='model') loadModel();
}

/* ── Steps ── */
const steps = [
  {
    tag:'Step 1 of 4', title:'Account basics',
    html:()=>`
      <div class="field">
        <label>How many months with you? (tenure)</label>
        <input type="number" id="f_ten" min="0" max="72" placeholder="0 – 72 months" value="${s.tenure}"/>
      </div>
      <div class="row2">
        <div class="field">
          <label>Monthly charges ($)</label>
          <input type="number" id="f_mon" step="0.01" placeholder="e.g. 65.50" value="${s.monthly_charges}"/>
        </div>
        <div class="field">
          <label>Total charges ($)</label>
          <input type="number" id="f_tot" step="0.01" placeholder="e.g. 786.00" value="${s.total_charges}"/>
        </div>
      </div>`,
    save:()=>{
      const t=parseInt(document.getElementById('f_ten').value,10);
      const m=parseFloat(document.getElementById('f_mon').value);
      const tc=parseFloat(document.getElementById('f_tot').value);
      if(isNaN(t)||isNaN(m)||isNaN(tc)) return 'Please fill all three fields.';
      if(t<0||t>72) return 'Tenure must be 0–72.';
      if(m<=0) return 'Monthly charges must be > 0.';
      s.tenure=t; s.monthly_charges=m; s.total_charges=tc;
    }
  },
  {
    tag:'Step 2 of 4', title:'Contract & billing',
    html:()=>`
      <div class="field">
        <label>Contract type</label>
        <div class="chips" id="c_con">
          ${ch('contract',['Month-to-month','One year','Two year'])}
        </div>
      </div>
      <div class="field">
        <label>Payment method</label>
        <div class="chips" id="c_pay">
          ${ch('payment_method',['Electronic check','Mailed check','Bank transfer (automatic)','Credit card (automatic)'])}
        </div>
      </div>
      <div class="field">
        <label>Paperless billing?</label>
        <div class="chips" id="c_pap">
          ${ch('paperless_billing',['Yes','No'])}
        </div>
      </div>`,
    save:()=>{
      if(!s.contract) return 'Pick a contract type.';
      if(!s.payment_method) return 'Pick a payment method.';
    }
  },
  {
    tag:'Step 3 of 4', title:'Services used',
    html:()=>`
      <div class="field">
        <label>Internet service</label>
        <div class="chips" id="c_int">${ch('internet_service',['Fiber optic','DSL','No'])}</div>
      </div>
      <div class="field">
        <label>Tech support</label>
        <div class="chips" id="c_tec">${ch('tech_support',['Yes','No','No internet service'])}</div>
      </div>
      <div class="field">
        <label>Online security</label>
        <div class="chips" id="c_sec">${ch('online_security',['Yes','No','No internet service'])}</div>
      </div>

      <div class="adv-toggle" onclick="toggleAdv(this)">
        <span class="adv-arrow">▶</span>
        <span>More services (optional)</span>
      </div>
      <div class="adv-section">
        <div class="adv-grid">
          <div class="field">
            <label>Online backup</label>
            <div class="chips" id="c_bak">${ch('online_backup',['Yes','No','No internet service'])}</div>
          </div>
          <div class="field">
            <label>Device protection</label>
            <div class="chips" id="c_dev">${ch('device_protection',['Yes','No','No internet service'])}</div>
          </div>
          <div class="field">
            <label>Phone service</label>
            <div class="chips" id="c_phs">${ch('phone_service',['Yes','No'])}</div>
          </div>
          <div class="field">
            <label>Multiple lines</label>
            <div class="chips" id="c_mlt">${ch('multiple_lines',['Yes','No','No phone service'])}</div>
          </div>
          <div class="field">
            <label>Streaming TV</label>
            <div class="chips" id="c_stv">${ch('streaming_tv',['Yes','No','No internet service'])}</div>
          </div>
          <div class="field">
            <label>Streaming movies</label>
            <div class="chips" id="c_smv">${ch('streaming_movies',['Yes','No','No internet service'])}</div>
          </div>
        </div>
      </div>`,
    save:()=>{
      if(!s.internet_service) return 'Pick an internet service.';
      if(!s.tech_support) return 'Pick tech support option.';
      if(!s.online_security) return 'Pick online security option.';
    }
  },
  {
    tag:'Step 4 of 4', title:'About the customer',
    html:()=>`
      <div class="row2">
        <div class="field">
          <label>Gender</label>
          <div class="chips" id="c_gen">${ch('gender',['Male','Female'])}</div>
        </div>
        <div class="field">
          <label>Senior citizen?</label>
          <div class="chips" id="c_sr">
            <div class="chip${s.senior_citizen===0?' on':''}" onclick="pickN('c_sr',0,'senior_citizen')">No</div>
            <div class="chip${s.senior_citizen===1?' on':''}" onclick="pickN('c_sr',1,'senior_citizen')">Yes</div>
          </div>
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>Has a partner?</label>
          <div class="chips" id="c_par">${ch('partner',['Yes','No'])}</div>
        </div>
        <div class="field">
          <label>Has dependents?</label>
          <div class="chips" id="c_dep">${ch('dependents',['Yes','No'])}</div>
        </div>
      </div>`,
    save:()=>{}
  }
];

function ch(key, vals) {
  return vals.map(v =>
    `<div class="chip${s[key]===v?' on':''}" onclick="pick(this,'${key}','${v}')">${v}</div>`
  ).join('');
}
function pick(el, key, val) {
  s[key]=val;
  el.closest('.chips').querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
}
function pickN(gid, val, key) {
  s[key]=val;
  document.querySelectorAll('#'+gid+' .chip').forEach((c,i)=>c.classList.toggle('on',i===val));
}
function toggleAdv(el) {
  const arrow = el.querySelector('.adv-arrow');
  const sec   = el.nextElementSibling;
  arrow.classList.toggle('open');
  sec.classList.toggle('open');
}

let cur = 0;

function drawProg() {
  document.getElementById('prog').innerHTML =
    steps.map((_,i)=>`<div class="prog-seg${i<=cur?' done':''}"></div>`).join('');
}

function draw() {
  drawProg();
  const st = steps[cur];
  document.getElementById('app').innerHTML = `
    <div class="card">
      <div class="card-body">
        <div class="step-tag">${st.tag}</div>
        <div class="card-title">${st.title}</div>
        ${st.html()}
      </div>
      <div class="err-msg" id="err"></div>
      <div class="card-foot">
        <button class="btn-back" onclick="back()" ${cur===0?'style="visibility:hidden"':''}>← Back</button>
        <button class="btn-next" id="nxt" onclick="next()">
          ${cur===steps.length-1?'Predict →':'Continue →'}
        </button>
      </div>
    </div>`;
}

function showErr(msg){const e=document.getElementById('err');e.textContent=msg;e.style.display='block';}
function back(){if(cur>0){cur--;draw();}}

async function next() {
  const err=steps[cur].save();
  if(err){showErr(err);return;}
  if(cur<steps.length-1){cur++;draw();return;}

  const btn=document.getElementById('nxt');
  btn.disabled=true;
  btn.innerHTML='<span class="spin"></span>Predicting…';

  try {
    const r=await fetch(`${BASE}/predict`,{
      method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(s)});
    if(!r.ok) throw new Error('API '+r.status);
    const d=await r.json();

    let risk='',action='Monitor this customer closely.';
    try{
      const rr=await fetch(`${BASE}/risk-segment?churn_probability=${d.churn_probability}`);
      const rd=await rr.json();
      risk=rd.risk_segment; action=rd.recommended_action;
    }catch(_){}

    showResult(d,risk,action);
  } catch(e){
    btn.disabled=false;btn.innerHTML='Predict →';
    showErr('Could not reach the API — check CORS settings on Cloud Run.');
  }
}

function showResult(d,risk,action){
  const prob=d.churn_probability;
  const pct=Math.round(prob*100);
  let col,icon,verdict,abg,acol;
  if(prob>=0.65){col='var(--danger)';icon='⚠️';verdict='High churn risk';abg='var(--danger-light)';acol='var(--danger)';}
  else if(prob>=0.35){col='var(--warn)';icon='📊';verdict='Moderate risk';abg='var(--warn-light)';acol='var(--warn)';}
  else{col='var(--success)';icon='✅';verdict='Likely to stay';abg='var(--success-light)';acol='var(--success)';}

  document.getElementById('prog').innerHTML=steps.map(()=>`<div class="prog-seg done"></div>`).join('');
  document.getElementById('app').innerHTML=`
    <div class="card">
      <div class="res-hero">
        <div class="res-icon">${icon}</div>
        <div class="res-verdict" style="color:${col}">${verdict}</div>
        <div class="prob-label">Churn probability</div>
        <div class="prob-num" id="pnum" style="color:${col}">0%</div>
        <div class="rtrack"><div class="rthumb" id="rth" style="left:0%"></div></div>
        <div class="rends"><span>Low risk</span><span>High risk</span></div>
      </div>
      <div class="action-box" style="background:${abg}">
        <div class="aicon">💡</div>
        <div class="atext">
          <span class="atitle" style="color:${acol}">Recommended action</span>
          ${action}
        </div>
      </div>
      <div class="meta-chips">
        ${risk?`<div class="meta-tag">Risk: ${risk}</div>`:''}
        <div class="meta-tag">Prediction: ${d.churn_prediction===1?'Churn':'Retain'}</div>
        <div class="meta-tag">Model v${d.model_version}</div>
        <div class="meta-tag">ID: ${d.prediction_id.slice(0,8)}…</div>
      </div>
      <button class="btn-reset" onclick="restart()">← Start over</button>
    </div>`;

  let n=0;
  const t=setInterval(()=>{n=Math.min(n+2,pct);document.getElementById('pnum').textContent=n+'%';if(n>=pct)clearInterval(t);},16);
  setTimeout(()=>{const pos=Math.min(prob*100,98);document.getElementById('rth').style.left=pos+'%';},80);
}

function restart(){
  Object.assign(s,{
    tenure:'',monthly_charges:'',total_charges:'',
    contract:'',payment_method:'',paperless_billing:'Yes',
    internet_service:'',tech_support:'',online_security:'',
    online_backup:'No',device_protection:'No',phone_service:'Yes',
    multiple_lines:'No',streaming_tv:'No',streaming_movies:'No',
    gender:'Male',senior_citizen:0,partner:'No',dependents:'No'
  });
  cur=0; draw();
}

/* ── Model info ── */
let modelLoaded=false;
async function loadModel(){
  const body=document.getElementById('model-body');
  if(modelLoaded) return;
  body.innerHTML='<div style="color:var(--muted);font-size:14px">Loading model info…</div>';  // FIX: show loading state on each attempt
  try{
    const r=await fetch(`${BASE}/model-info`);
    const d=await r.json();
    modelLoaded=true;
    document.getElementById('model-body').innerHTML=`
      <div class="step-tag" style="margin-bottom:16px">Champion Model</div>
      <div class="model-grid">
        ${mrow('Model name',d.model_name)}
        ${mrow('Version','v'+d.model_version)}
        ${mrow('Stage',d.stage)}
        ${mrow(d.primary_metric.toUpperCase(),d.primary_metric_value.toFixed(4))}
        ${mrow('Decision threshold',d.threshold.toFixed(4))}
        ${mrow('Trained at',new Date(d.trained_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}))}
      </div>`;
  }catch(_){
    document.getElementById('model-body').innerHTML='<div style="color:var(--muted);font-size:14px">Could not load model info.</div>';
  }
}
function mrow(k,v){
  return `<div class="model-cell"><div class="model-key">${k}</div><div class="model-val">${v}</div></div>`;
}

/* ── Health ping ── */
async function ping(){
  try{
    const r=await fetch(`${BASE}/health`);
    if(!r.ok) throw new Error();
    document.getElementById('dot').className='dot live';
    document.getElementById('api-lbl').textContent='API live';
  }catch(_){
    document.getElementById('dot').className='dot';   // FIX: reset dot style on failure
    document.getElementById('api-lbl').textContent='offline';
  }
}
ping();
draw();
</script>
